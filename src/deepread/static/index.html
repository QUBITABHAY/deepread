<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DeepRead - Research Paper AI</title>
    <meta
      name="description"
      content="AI-powered research paper assistant with citations and LaTeX support"
    />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css"
    />
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"
    ></script>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"
      onload="onKaTeXReady()"
    ></script>
    <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --bg: #0b0f1a;
        --bg-2: #111827;
        --bg-card: #141c2e;
        --bg-card-2: #1a2035;
        --bg-input: #0f172a;
        --border: rgba(255, 255, 255, 0.07);
        --border-md: rgba(255, 255, 255, 0.11);
        --text: #f1f5f9;
        --text-2: #94a3b8;
        --text-3: #475569;
        --indigo: #6366f1;
        --indigo-2: #818cf8;
        --indigo-dim: rgba(99, 102, 241, 0.15);
        --orange: #f59e0b;
        --orange-dim: rgba(245, 158, 11, 0.12);
        --radius: 12px;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Inter", sans-serif;
        background: var(--bg);
        color: var(--text);
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      header {
        height: 58px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 28px;
        background: var(--bg-2);
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
        z-index: 20;
      }

      .h-brand {
        display: flex;
        align-items: center;
        gap: 10px;
        font-weight: 700;
        font-size: 1rem;
        letter-spacing: -0.01em;
      }

      .h-brand-icon {
        width: 34px;
        height: 34px;
        background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
        border-radius: 9px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 17px;
        box-shadow: 0 0 16px rgba(99, 102, 241, 0.35);
      }

      .h-center {
        display: flex;
        align-items: center;
        gap: 28px;
      }

      .h-title {
        font-size: 1rem;
        font-weight: 600;
        color: var(--text);
      }

      .h-nav {
        display: flex;
        gap: 22px;
      }

      .h-nav a {
        font-size: 0.84rem;
        font-weight: 500;
        color: var(--text-2);
        text-decoration: none;
        padding-bottom: 3px;
        transition: color 0.18s;
      }

      .h-nav a:hover {
        color: var(--text);
      }

      .h-nav a.active {
        color: var(--text);
        border-bottom: 2px solid var(--indigo);
      }

      .btn-upload {
        display: flex;
        align-items: center;
        gap: 7px;
        padding: 7px 16px;
        background: var(--indigo);
        color: #fff;
        border: none;
        border-radius: 9px;
        font-size: 0.84rem;
        font-weight: 600;
        cursor: pointer;
        transition:
          background 0.18s,
          box-shadow 0.18s;
        font-family: inherit;
      }

      .btn-upload:hover {
        background: var(--indigo-2);
        box-shadow: 0 0 18px rgba(99, 102, 241, 0.4);
      }

      .main {
        display: flex;
        flex: 1;
        overflow: hidden;
      }

      .chat-col {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        border-right: 1px solid var(--border);
      }

      #messages {
        flex: 1;
        overflow-y: auto;
        padding: 32px 40px;
        display: flex;
        flex-direction: column;
        gap: 22px;
        scroll-behavior: smooth;
      }

      #messages::-webkit-scrollbar {
        width: 5px;
      }
      #messages::-webkit-scrollbar-thumb {
        background: #1e293b;
        border-radius: 3px;
      }


      .empty {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100%;
        gap: 14px;
        text-align: center;
        color: var(--text-3);
      }

      .empty-icon {
        font-size: 52px;
        opacity: 0.35;
      }

      .empty h3 {
        font-size: 1.05rem;
        font-weight: 600;
        color: var(--text-2);
      }

      .empty p {
        font-size: 0.85rem;
        max-width: 280px;
        line-height: 1.65;
      }


      .msg-ai {
        display: flex;
        gap: 14px;
        align-items: flex-start;
        max-width: 760px;
      }


      .msg-user {
        display: flex;
        gap: 14px;
        align-items: flex-start;
        flex-direction: row-reverse;
        align-self: flex-end;
        max-width: 680px;
      }

      .avatar {
        width: 34px;
        height: 34px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.02em;
        flex-shrink: 0;
        margin-top: 3px;
      }

      .av-ai {
        background: var(--orange-dim);
        border: 1.5px solid rgba(245, 158, 11, 0.4);
        color: var(--orange);
      }

      .av-user {
        background: var(--indigo-dim);
        border: 1.5px solid rgba(99, 102, 241, 0.4);
        color: var(--indigo-2);
      }

      .bubble {
        background: var(--bg-card-2);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 16px 20px;
        font-size: 0.885rem;
        line-height: 1.72;
        color: var(--text);
      }

      .bubble-user {
        background: var(--indigo);
        border-color: rgba(255, 255, 255, 0.1);
        color: rgba(255, 255, 255, 0.95);
      }


      .bubble p {
        margin-bottom: 9px;
      }
      .bubble p:last-child {
        margin-bottom: 0;
      }
      .bubble ul,
      .bubble ol {
        padding-left: 20px;
        margin-bottom: 9px;
      }
      .bubble li {
        margin-bottom: 5px;
      }
      .bubble strong {
        color: #e2e8f0;
      }
      .bubble em {
        color: var(--text-2);
      }
      .bubble h1,
      .bubble h2,
      .bubble h3 {
        font-size: 0.93rem;
        font-weight: 700;
        margin: 12px 0 6px;
        color: var(--text);
      }
      .bubble code {
        background: rgba(255, 255, 255, 0.07);
        padding: 1px 6px;
        border-radius: 5px;
        font-size: 0.81rem;
        font-family: "JetBrains Mono", "Fira Code", monospace;
      }
      .bubble pre {
        background: rgba(0, 0, 0, 0.3);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 12px 14px;
        overflow-x: auto;
        margin: 10px 0;
      }
      .bubble pre code {
        background: none;
        padding: 0;
        font-size: 0.82rem;
      }


      .cites {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: 12px;
        padding-top: 11px;
        border-top: 1px solid var(--border);
      }

      .cite {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 2px 9px;
        background: var(--indigo-dim);
        border: 1px solid rgba(99, 102, 241, 0.25);
        border-radius: 6px;
        font-size: 0.7rem;
        font-weight: 650;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: #a5b4fc;
      }


      .dots {
        display: flex;
        gap: 6px;
        align-items: center;
        padding: 6px 0;
      }

      .dots span {
        width: 7px;
        height: 7px;
        background: var(--indigo);
        border-radius: 50%;
        animation: dot-bounce 1.1s infinite;
      }

      .dots span:nth-child(2) {
        animation-delay: 0.18s;
      }
      .dots span:nth-child(3) {
        animation-delay: 0.36s;
      }

      @keyframes dot-bounce {
        0%,
        60%,
        100% {
          transform: translateY(0);
          opacity: 0.35;
        }
        30% {
          transform: translateY(-7px);
          opacity: 1;
        }
      }

      .input-bar {
        padding: 14px 28px 18px;
        border-top: 1px solid var(--border);
        background: var(--bg-2);
      }

      .input-wrap {
        display: flex;
        align-items: center;
        gap: 8px;
        background: var(--bg-input);
        border: 1px solid var(--border-md);
        border-radius: var(--radius);
        padding: 9px 12px;
        transition: border-color 0.18s;
      }

      .input-wrap:focus-within {
        border-color: var(--indigo);
      }

      .icon-btn {
        background: none;
        border: none;
        color: var(--text-3);
        cursor: pointer;
        padding: 4px;
        border-radius: 6px;
        display: flex;
        transition:
          color 0.18s,
          background 0.18s;
        flex-shrink: 0;
      }

      .icon-btn:hover {
        color: var(--text-2);
        background: rgba(255, 255, 255, 0.05);
      }
      .icon-btn svg {
        width: 20px;
        height: 20px;
      }

      #msg-input {
        flex: 1;
        background: none;
        border: none;
        outline: none;
        color: var(--text);
        font-size: 0.885rem;
        font-family: inherit;
        resize: none;
        height: 24px;
        max-height: 120px;
        overflow-y: auto;
        line-height: 1.55;
      }

      #msg-input::placeholder {
        color: var(--text-3);
      }

      .send-btn {
        width: 34px;
        height: 34px;
        background: var(--indigo);
        border: none;
        border-radius: 9px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition:
          background 0.18s,
          transform 0.1s,
          box-shadow 0.18s;
        flex-shrink: 0;
        color: #fff;
      }

      .send-btn:hover {
        background: var(--indigo-2);
        box-shadow: 0 0 14px rgba(99, 102, 241, 0.45);
      }

      .send-btn:active {
        transform: scale(0.92);
      }
      .send-btn:disabled {
        background: var(--text-3);
        cursor: not-allowed;
        box-shadow: none;
      }
      .send-btn svg {
        width: 17px;
        height: 17px;
      }

      .sidebar {
        width: 296px;
        flex-shrink: 0;
        display: flex;
        flex-direction: column;
        background: var(--bg-2);
        overflow-y: auto;
      }

      .sidebar::-webkit-scrollbar {
        width: 4px;
      }
      .sidebar::-webkit-scrollbar-thumb {
        background: #1e293b;
        border-radius: 2px;
      }

      .sb-section {
        padding: 22px 18px;
        border-bottom: 1px solid var(--border);
      }

      .sb-label {
        font-size: 0.68rem;
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--text-3);
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 14px;
      }

      .count-pill {
        background: var(--indigo-dim);
        border: 1px solid rgba(99, 102, 241, 0.28);
        color: #a5b4fc;
        border-radius: 20px;
        padding: 1px 9px;
        font-size: 0.67rem;
        font-weight: 600;
        letter-spacing: 0;
        text-transform: none;
      }


      .paper-card {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 9px 11px;
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 10px;
        margin-bottom: 8px;
        transition: border-color 0.18s;
      }

      .paper-card:hover {
        border-color: var(--border-md);
      }

      .paper-ico {
        width: 30px;
        height: 30px;
        background: var(--indigo-dim);
        border: 1px solid rgba(99, 102, 241, 0.25);
        border-radius: 7px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 13px;
        flex-shrink: 0;
      }

      .paper-info {
        flex: 1;
        min-width: 0;
      }

      .paper-name {
        font-size: 0.78rem;
        font-weight: 600;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .paper-sub {
        font-size: 0.69rem;
        color: var(--text-3);
        margin-top: 2px;
      }

      .no-papers {
        font-size: 0.8rem;
        color: var(--text-3);
        text-align: center;
        padding: 16px 0;
      }


      .ex-btn {
        display: block;
        width: 100%;
        text-align: left;
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 9px;
        padding: 9px 13px;
        color: var(--text-2);
        font-size: 0.8rem;
        font-family: inherit;
        cursor: pointer;
        margin-bottom: 7px;
        transition:
          border-color 0.18s,
          color 0.18s,
          background 0.18s;
      }

      .ex-btn:last-child {
        margin-bottom: 0;
      }

      .ex-btn:hover {
        border-color: var(--indigo);
        color: var(--text);
        background: var(--bg-card-2);
      }


      .katex {
        font-size: 1em !important;
      }
      .katex-display {
        margin: 12px 0 !important;
        overflow-x: auto;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="h-brand">
        <div class="h-brand-icon">
          <svg
            width="18"
            height="18"
            fill="none"
            stroke="#fff"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"
            />
          </svg>
        </div>
        DeepRead
      </div>

      <div class="h-center">
        <span class="h-title">Research Session</span>
        <nav class="h-nav">
          <a href="#" class="active">Archive</a>
          <a href="#">Methodologies</a>
          <a href="#">Settings</a>
        </nav>
      </div>

      <button
        class="btn-upload"
        onclick="document.getElementById('file-input').click()"
      >
        <svg
          width="15"
          height="15"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586
               a1 1 0 01.707.293l5.414 5.414A1 1 0 0119 9.414V19a2 2 0 01-2 2z"
          />
        </svg>
        Upload PDF
      </button>
    </header>

    <div class="main">

      <div class="chat-col">
        <div id="messages">
          <div class="empty" id="empty-state">
            <div class="empty-icon" style="color: var(--text-3); opacity: 0.35">
              <svg
                width="52"
                height="52"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="1.5"
                  d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414A1 1 0 0119 9.414V19a2 2 0 01-2 2z"
                />
              </svg>
            </div>
            <h3>Upload a research paper to begin</h3>
            <p>
              Ask about methodology, results, equations, limitations, and more.
            </p>
          </div>
        </div>


        <div class="input-bar">
          <div class="input-wrap">
            <button
              class="icon-btn"
              onclick="document.getElementById('file-input').click()"
              title="Attach PDF"
            >
              <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586
                     a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"
                />
              </svg>
            </button>

            <textarea
              id="msg-input"
              rows="1"
              placeholder="Ask about your research papers..."
            ></textarea>

            <button class="send-btn" id="send-btn" onclick="sendMessage()">
              <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"
                />
              </svg>
            </button>
          </div>
        </div>
      </div>


      <div class="sidebar">
        <div class="sb-section">
          <div class="sb-label">
            Papers Loaded
            <span class="count-pill" id="count-pill">0 Files</span>
          </div>
          <div id="papers-list">
            <div class="no-papers">No papers uploaded yet</div>
          </div>
        </div>

        <div class="sb-section">
          <div class="sb-label">Example Questions</div>
          <div id="examples"></div>
        </div>
      </div>
    </div>


    <input
      type="file"
      id="file-input"
      accept=".pdf"
      style="display: none"
      onchange="handleUpload(event)"
    />

    <script>
      const API = "http://localhost:8080/api";
      let papers = [];
      let busy = false;
      let katexReady = false;

      const EXAMPLES = [
        "What is this paper about?",
        "What methodology or approach was used?",
        "What were the main results or findings?",
        "What are the limitations of this study?",
        "How does this compare to prior research?",
        "What datasets were used in experiments?",
        "What future work do the authors suggest?",
      ];

      marked.setOptions({ breaks: true, pedantic: false, smartypants: false });

      (function init() {
        document.getElementById("examples").innerHTML = EXAMPLES.map(
          (q) =>
            `<button class="ex-btn" onclick="ask(${JSON.stringify(q)})">${q}</button>`,
        ).join("");

        const ta = document.getElementById("msg-input");
        ta.addEventListener("input", () => {
          ta.style.height = "auto";
          ta.style.height = Math.min(ta.scrollHeight, 120) + "px";
        });
        ta.addEventListener("keydown", (e) => {
          if (e.key === "Enter" && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
          }
        });
      })();

      function onKaTeXReady() {
        katexReady = true;
        document.querySelectorAll(".bubble").forEach(renderContent);
      }

      // Problem: marked.js treats `_` as italic and `$` has no special meaning,
      // so LaTeX like `$\hat{\theta}_{G}$` gets mangled into `<em>` tags before
      // KaTeX ever sees it.
      //
      // Solution:
      //   1. Pull all math blocks out of the text, replace with inert placeholders.
      //   2. Run marked.js on the placeholder-safe text.
      //   3. Set innerHTML.
      const PH = (i) => `@MATH${i}@`;
      const PH_RE = /@MATH(\d+)@/g;

      function extractMath(text) {
        const blocks = [];
        let s = text;

        s = s.replace(/\$\$([\s\S]*?)\$\$/g, (m) => {
          blocks.push(m);
          return PH(blocks.length - 1);
        });

        // Display math  \[...\]
        s = s.replace(/\\\[([\s\S]*?)\\\]/g, (m) => {
          blocks.push(m);
          return PH(blocks.length - 1);
        });

        // Inline math  $...$  (not preceded or followed by another $)
        s = s.replace(/(?<!\$)\$(?!\$)((?:[^$\\]|\\.)+?)\$(?!\$)/g, (m) => {
          blocks.push(m);
          return PH(blocks.length - 1);
        });

        // Inline math  \(...\)
        s = s.replace(/\\\(([\s\S]*?)\\\)/g, (m) => {
          blocks.push(m);
          return PH(blocks.length - 1);
        });

        return { safe: s, blocks };
      }

      function restoreMath(root, blocks) {
        if (!blocks.length) return;

        // Collect all text nodes under root
        const walker = document.createTreeWalker(
          root,
          NodeFilter.SHOW_TEXT,
          null,
          false,
        );
        const nodes = [];
        let n;
        while ((n = walker.nextNode())) nodes.push(n);

        for (const node of nodes) {
          if (!node.textContent.includes("@MATH")) continue;

          // Split the text on placeholders and rebuild as DOM nodes
          const frag = document.createDocumentFragment();
          let last = 0;
          PH_RE.lastIndex = 0;
          let m;

          while ((m = PH_RE.exec(node.textContent)) !== null) {
            if (m.index > last)
              frag.appendChild(
                document.createTextNode(node.textContent.slice(last, m.index)),
              );

            // Restore LaTeX as a text node - KaTeX auto-render will pick it up
            frag.appendChild(
              document.createTextNode(blocks[parseInt(m[1], 10)]),
            );
            last = m.index + m[0].length;
          }

          if (last < node.textContent.length)
            frag.appendChild(
              document.createTextNode(node.textContent.slice(last)),
            );

          node.parentNode.replaceChild(frag, node);
        }
      }

      const KATEX_DELIMITERS = [
        { left: "$$", right: "$$", display: true },
        { left: "$", right: "$", display: false },
        { left: "\\[", right: "\\]", display: true },
        { left: "\\(", right: "\\)", display: false },
      ];

      function renderContent(el, rawText) {
        // Called either with (el, string) for new messages, or (el) for re-render
        if (typeof rawText === "string") {
          const { safe, blocks } = extractMath(rawText);
          el.innerHTML = marked.parse(safe);
          restoreMath(el, blocks);
        }
        // KaTeX pass
        if (katexReady && window.renderMathInElement) {
          renderMathInElement(el, {
            delimiters: KATEX_DELIMITERS,
            throwOnError: false,
          });
        }
      }

      async function handleUpload(e) {
        const file = e.target.files[0];
        e.target.value = "";
        if (!file) return;

        showSystem(`Uploading **${file.name}**...`);

        const fd = new FormData();
        fd.append("file", file);

        try {
          const res = await fetch(`${API}/upload`, {
            method: "POST",
            body: fd,
          });
          const data = await res.json();
          if (res.ok) {
            papers.push(file.name);
            refreshPapers();
            showSystem(
              `**${file.name}** uploaded successfully.\n\n_${data.message}_`,
            );
          } else {
            showSystem(
              `Upload failed: ${data.detail || data.message || res.statusText}`,
            );
          }
        } catch (err) {
          showSystem(`Upload error: ${err.message}`);
        }
      }

      function refreshPapers() {
        document.getElementById("count-pill").textContent =
          `${papers.length} File${papers.length !== 1 ? "s" : ""}`;
        document.getElementById("papers-list").innerHTML = papers.length
          ? papers
              .map(
                (n) => `
          <div class="paper-card">
            <div class="paper-ico"><svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414A1 1 0 0119 9.414V19a2 2 0 01-2 2z"/></svg></div>
            <div class="paper-info">
              <div class="paper-name" title="${n}">${n}</div>
              <div class="paper-sub">PDF · Indexed</div>
            </div>
          </div>`,
              )
              .join("")
          : '<div class="no-papers">No papers uploaded yet</div>';
      }

      function sendMessage() {
        const ta = document.getElementById("msg-input");
        const text = ta.value.trim();
        if (!text || busy) return;
        ta.value = "";
        ta.style.height = "24px";
        ask(text);
      }

      async function ask(text) {
        if (busy) return;
        if (!papers.length) {
          showSystem("Please upload a PDF first before asking questions.");
          return;
        }

        hideEmpty();
        addUserBubble(text);
        const lid = addLoader();
        busy = true;
        document.getElementById("send-btn").disabled = true;

        try {
          const res = await fetch(`${API}/query`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ question: text, sources: papers }),
          });
          const data = await res.json();
          removeEl(lid);
          addAIBubble(
            res.ok
              ? data.answer
              : `Error: ${data.detail || data.message || res.statusText}`,
          );
        } catch (err) {
          removeEl(lid);
          addAIBubble(`Request failed: ${err.message}`);
        } finally {
          busy = false;
          document.getElementById("send-btn").disabled = false;
        }
      }

      function hideEmpty() {
        document.getElementById("empty-state")?.remove();
      }

      function addUserBubble(text) {
        const row = el("div", "msg-user");
        const bub = el("div", "bubble bubble-user");
        bub.textContent = text; // user text: plain, no markdown/LaTeX needed
        row.innerHTML = '<div class="avatar av-user">U</div>';
        row.appendChild(bub);
        msgs().appendChild(row);
        scrollBottom();
      }

      function addAIBubble(text) {
        const tags = papers.filter((p) =>
          text.toLowerCase().includes(p.toLowerCase().replace(".pdf", "")),
        );

        const row = el("div", "msg-ai");
        const bub = el("div", "bubble");

        renderContent(bub, text); // ← LaTeX-safe pipeline

        if (tags.length) {
          const cites = el("div", "cites");
          cites.innerHTML = tags
            .map((t) => `<span class="cite">${t}</span>`)
            .join("");
          bub.appendChild(cites);
        }

        row.innerHTML = '<div class="avatar av-ai">AI</div>';
        row.appendChild(bub);
        msgs().appendChild(row);
        scrollBottom();
      }

      function showSystem(text) {
        hideEmpty();
        const row = el("div", "msg-ai");
        const bub = el("div", "bubble");
        renderContent(bub, text);
        row.innerHTML = '<div class="avatar av-ai">AI</div>';
        row.appendChild(bub);
        msgs().appendChild(row);
        scrollBottom();
      }

      let _lid = 0;
      function addLoader() {
        const id = `ld-${++_lid}`;
        const row = el("div", "msg-ai");
        row.id = id;
        row.innerHTML = `
      <div class="avatar av-ai">AI</div>
      <div class="bubble">
        <div class="dots"><span></span><span></span><span></span></div>
      </div>`;
        msgs().appendChild(row);
        scrollBottom();
        return id;
      }

      function removeEl(id) {
        document.getElementById(id)?.remove();
      }

      function el(tag, cls) {
        const e = document.createElement(tag);
        if (cls) e.className = cls;
        return e;
      }

      function msgs() {
        return document.getElementById("messages");
      }
      function scrollBottom() {
        const m = msgs();
        requestAnimationFrame(() => {
          m.scrollTop = m.scrollHeight;
        });
      }
    </script>
  </body>
</html>
